services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Postgres ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: praxis_agents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d praxis_agents"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Agent Worker ───────────────────────────────────────────────────────────
  worker:
    image: ${WORKER_IMAGE:-yourusername/praxis-worker:latest}
    env_file:
      - .env.server
    environment:
      # Override DATABASE_URL and REDIS_URL so they use Docker internal networking
      # (worker → redis/postgres containers by service name, not external IP)
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/praxis_agents
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
